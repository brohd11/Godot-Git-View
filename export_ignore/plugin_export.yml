export_root: "res://addons/git_view/export_ignore/exports"
plugin_folder: "GitView{{version=git_view}}"
pre_script: "res://addons/git_view/export_ignore/pre_post_export.gd"
post_script: "res://addons/git_view/export_ignore/pre_post_export.gd"
options:
  overwrite: true
  include_uid: true
  include_import: true
  ignore_src: true
  use_tag_in_cfg: true
  remove_cfg_deps: true
  include_min_version: true
  move_global_files: true
  parser_settings:
    use_relative_paths: false
    backport_target: 100
    parse_cs:
      namespace_rename: {}
    parse_gd:
      replace_editor_interface: false
      class_rename_ignore: []
      backport_string_renames: {}
    parse_tscn: {}
    parse_tres: {}
exports:
  -
    source: "res://addons/git_view"
    export_folder: "git-view{{version=git_view}}/git_view"
    exclude:
      directories:
        - "res://addons/git_view/export_ignore"
      file_extensions: []
      files: []
    other_transfers: []
    parser_overide_settings:
      parse_cs: {}
      parse_gd: {}
      parse_tscn: {}
      parse_tres: {}
    remote_dir: "res://addons/git_view/src/remote"
